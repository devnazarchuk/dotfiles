# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

# =============================================================================
# ПЕРСОНАЛЬНІ БІНДИ (devnazarchuk)
# =============================================================================

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Очищення стандартних біндів
unbind = SUPER, Space
unbind = SUPER, Super_L
unbind = SUPER, F
unbind = SUPER, W
unbind = SUPER, Q
unbind = SUPER, V
unbind = SUPER, Slash
unbind = SUPER, T

# -- Launcher & Menus --
# Super (L) -> Пошук програм (Omarchy Walker)
bindr = SUPER, Super_L, exec, omarchy-launch-walker
# Super + Space -> Повне меню Omarchy
unbind = SUPER, Space
bind  = SUPER, Space, exec, omarchy-menu
# Super + V -> Буфер обміну
bind  = SUPER, V, exec, /home/arch/.local/bin/omarchy-fuzzel-clipboard

# Теми та шпалери
bind  = SUPER_ALT, T, exec, omarchy-menu background
bind  = SUPER_SHIFT, T, exec, omarchy-menu theme

bind  = SUPER, Slash, exec, omarchy-menu-keybindings
bind  = SUPER, Period, exec, omarchy-launch-tui "fuzzel-emoji"
bind  = CTRL_SUPER, R, exec, hyprctl reload

# -- Window Management --
# bindr = SUPER, Super_L, togglefloating, # Закоментовано за запитом
# bind = SUPER_ALT, Space, togglefloating, # Закоментовано
# bind = SUPER_SHIFT_ALT, Q, exec, hyprctl kill # Закоментовано
bind = SUPER, Q, killactive,
bind = SUPER, F, fullscreen, 0
bind = SUPER, D, fullscreen, 1
bind = SUPER, P, pin

# -- Window split ratio --
binde = SUPER, Semicolon, layoutmsg, splitratio -0.1
binde = SUPER, Apostrophe, layoutmsg, splitratio +0.1

# -- Zoom (Screen) --
binde = SUPER, Minus, exec, hyprctl keyword misc:cursor_zoom_factor $(hyprctl getoption misc:cursor_zoom_factor -j | jq -r 'if .float <= 1.0 then 1.0 else .float - 0.1 end')
binde = SUPER, Equal, exec, hyprctl keyword misc:cursor_zoom_factor $(hyprctl getoption misc:cursor_zoom_factor -j | jq -r '.float + 0.1')

# -- Navigation (Focus) --
bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d
bind = SUPER, BracketLeft, movefocus, l
bind = SUPER, BracketRight, movefocus, r

# -- Navigation (Move) --
bind = SUPER_SHIFT, Left, movewindow, l
bind = SUPER_SHIFT, Right, movewindow, r
bind = SUPER_SHIFT, Up, movewindow, d
bind = SUPER_SHIFT, Down, movewindow, u

# -- Apps --
bind = SUPER, Return, exec, uwsm-app -- xdg-terminal-exec
bind = SUPER, T, exec, uwsm-app -- Telegram
bind = SUPER, E, exec, uwsm-app -- nautilus --new-window
bind = SUPER, W, exec, omarchy-launch-browser
bind = SUPER, C, exec, omarchy-launch-editor
bind = SUPER, X, exec, kate || gnome-text-editor
bind = SUPER, I, exec, systemsettings || gnome-control-center
bind = CTRL_SHIFT, Escape, exec, gnome-system-monitor || btop
bind = CTRL_SUPER, V, exec, pavucontrol

# -- Workspaces --
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER_ALT, 1, movetoworkspacesilent, 1
bind = SUPER_ALT, 2, movetoworkspacesilent, 2
bind = SUPER_ALT, 3, movetoworkspacesilent, 3
bind = SUPER_ALT, 4, movetoworkspacesilent, 4
bind = SUPER_ALT, 5, movetoworkspacesilent, 5
bind = SUPER_ALT, 6, movetoworkspacesilent, 6
bind = SUPER_ALT, 7, movetoworkspacesilent, 7
bind = SUPER_ALT, 8, movetoworkspacesilent, 8
bind = SUPER_ALT, 9, movetoworkspacesilent, 9
bind = SUPER_ALT, 0, movetoworkspacesilent, 10

# -- Screenshots, OCR & Utilities --
bind = SUPER_SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = SUPER_SHIFT, C, exec, hyprpicker -a
bind = , Print, exec, hyprshot -m output --clipboard-only
bind = SUPER_SHIFT, T, exec, grim -g "$(slurp)" - | tesseract stdin stdout -l ukr+eng | wl-copy

# -- Media --
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Media Controls
bindl = SUPER_SHIFT, P, exec, playerctl play-pause
bindl = SUPER_SHIFT, N, exec, playerctl next
bindl = SUPER_SHIFT, B, exec, playerctl previous

# Session
bind = SUPER, L, exec, loginctl lock-session
bind = SUPER_SHIFT, L, exec, systemctl suspend
