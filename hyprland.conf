# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# --- Omarchy Defaults (System) ---
source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

# --- Personal Configuration ---
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

# =============================================================================
# PERSONAL SETTINGS (devnazarchuk)
# =============================================================================

# Speed up app launch and update environment
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Cursor settings
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

# -- Web Apps --
bind = SUPER, D, exec, uwsm-app -- chromium --app="https://ticktick.com/webapp/"
bind = SUPER, A, exec, uwsm-app -- chromium --app="https://notebooklm.google.com/"
bind = SUPER, S, exec, uwsm-app -- chromium --app="https://open.spotify.com/"

bind = SUPER_SHIFT, C, exec, uwsm-app -- chromium --app="https://calendar.google.com"
bind = SUPER_SHIFT, E, exec, uwsm-app -- chromium --app="https://mail.google.com"
bind = SUPER_SHIFT, Y, exec, uwsm-app -- chromium --app="https://youtube.com/"
bind = SUPER_SHIFT, W, exec, uwsm-app -- chromium --app="https://web.whatsapp.com/"

# -- Window Management & Workspace Customizations --
bind = SUPER, Q, killactive,
bind = SUPER, P, pin
# Special Workspace (Scratchpad on W)
bind = SUPER, W, togglespecialworkspace,
bind = SUPER_ALT, W, movetoworkspacesilent, special

# -- Navigation --
bind = SUPER, BracketLeft, movefocus, l
bind = SUPER, BracketRight, movefocus, r

# -- Window split ratio --
binde = SUPER, Semicolon, layoutmsg, splitratio -0.1
binde = SUPER, Apostrophe, layoutmsg, splitratio +0.1

# -- Apps (Overrides) --
bind = SUPER, Return, exec, uwsm-app -- xdg-terminal-exec
bind = SUPER, T, exec, uwsm-app -- Telegram
bind = SUPER, E, exec, uwsm-app -- nautilus --new-window
bind = SUPER, B, exec, omarchy-launch-browser
bind = SUPER, C, exec, omarchy-launch-editor
bind = SUPER, I, exec, systemsettings || gnome-control-center
bind = CTRL_SHIFT, Escape, exec, gnome-system-monitor || btop

# -- Screenshots & OCR --
bind = SUPER_SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = SUPER_SHIFT, X, exec, grim -g "$(slurp)" - | tesseract stdin stdout -l ukr+eng+deu+rus | wl-copy
bind = SUPER_SHIFT, C, exec, hyprpicker -a
