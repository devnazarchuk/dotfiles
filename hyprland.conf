# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

source = ~/.local/share/omarchy/default/hypr/autostart.conf
source = ~/.local/share/omarchy/default/hypr/bindings/media.conf
source = ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
source = ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
source = ~/.local/share/omarchy/default/hypr/envs.conf
source = ~/.local/share/omarchy/default/hypr/looknfeel.conf
source = ~/.local/share/omarchy/default/hypr/input.conf
source = ~/.local/share/omarchy/default/hypr/windows.conf
source = ~/.config/omarchy/current/theme/hyprland.conf

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf

# =============================================================================
# ПЕРСОНАЛЬНІ БІНДИ (devnazarchuk)
# =============================================================================

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Очищення стандартних біндів
unbind = SUPER, Space
unbind = SUPER, Super_L
unbind = SUPER, F
unbind = SUPER, W
unbind = SUPER, Q
unbind = SUPER, V

# -- Launcher & Menus --
# Super (L) -> Пошук програм (Omarchy Walker)
bindr = SUPER, Super_L, exec, omarchy-launch-walker
# Super + Space -> Повне меню Omarchy
unbind = SUPER, Space
bind  = SUPER, Space, exec, omarchy-menu
# Super + V -> Буфер обміну (themed)
bind  = SUPER, V, exec, /home/arch/.local/bin/omarchy-fuzzel-clipboard

# -- Omarchy Utilities --
bind = SUPER, Slash, exec, omarchy-menu-keybindings # Шпаргалка
bind = SUPER_ALT, T, exec, omarchy-menu background # Меню шпалер
bind = SUPER_ALT, N, exec, omarchy-toggle-nightlight # Нічне світло
bind = SUPER_ALT, G, exec, omarchy-hyprland-window-gaps-toggle # Перемикач відступів
bind = SUPER_ALT, L, exec, omarchy-lock-screen # Замок екрана
bind = SUPER_CTRL, R, exec, hyprctl reload

# -- Window Management --
# bindr = SUPER, Super_L, togglefloating, # Закоментовано
bind = SUPER, Q, killactive,
bind = SUPER, F, fullscreen, 0
bind = SUPER, D, fullscreen, 1
bind = SUPER, P, pin
bind = SUPER_ALT, Space, togglefloating, # Повертаємо на Alt+Space за логікою списку

# -- Navigation --
bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d
bind = SUPER, BracketLeft, movefocus, l
bind = SUPER, BracketRight, movefocus, r

bind = SUPER_SHIFT, Left, movewindow, l
bind = SUPER_SHIFT, Right, movewindow, r
bind = SUPER_SHIFT, Up, movewindow, d
bind = SUPER_SHIFT, Down, movewindow, u

# -- Apps --
bind = SUPER, Return, exec, uwsm-app -- xdg-terminal-exec
bind = SUPER, T, exec, uwsm-app -- xdg-terminal-exec
bind = SUPER, E, exec, uwsm-app -- nautilus --new-window
bind = SUPER, W, exec, omarchy-launch-browser
bind = SUPER, C, exec, omarchy-launch-editor
bind = SUPER, X, exec, kate || gnome-text-editor
bind = SUPER, I, exec, omarchy-menu system # Системне меню на I
bind = CTRL_SHIFT, Escape, exec, omarchy-launch-tui btop # Btop як Task manager

# -- Workspaces --
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 4
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER_ALT, 1, movetoworkspacesilent, 1
bind = SUPER_ALT, 2, movetoworkspacesilent, 2
bind = SUPER_ALT, 3, movetoworkspacesilent, 3
bind = SUPER_ALT, 4, movetoworkspacesilent, 4
bind = SUPER_ALT, 5, movetoworkspacesilent, 5
bind = SUPER_ALT, S, movetoworkspacesilent, special
bind = CTRL_SUPER, S, togglespecialworkspace,

# -- Screenshots & Media (Omarchy style) --
bind = SUPER_SHIFT, S, exec, omarchy-cmd-screenshot # Стандартний скріншот Omarchy
bind = SUPER_CTRL, C, exec, omarchy-menu capture # Меню захоплення (Screenrecord тощо)
bind = SUPER_SHIFT, C, exec, hyprpicker -a

# Media (XF86 keys handled by media.conf, adding custom ones)
bindl = SUPER_SHIFT, P, exec, playerctl play-pause
bindl = SUPER_SHIFT, N, exec, playerctl next
bindl = SUPER_SHIFT, B, exec, playerctl previous
