# =============================================================================
# APPLICATION BINDINGS (devnazarchuk)
# =============================================================================

# -- System & Menus --
bindr = SUPER, Super_L, exec, omarchy-launch-walker
bind  = SUPER, Space, exec, omarchy-menu
bind  = SUPER, R, exec, hyprctl reload
bind  = SUPER, Slash, exec, omarchy-menu-keybindings
bind  = SUPER, Period, exec, omarchy-launch-tui "fuzzel-emoji"

# -- Core Apps --
bindd = SUPER, Return, Terminal, exec, uwsm-app -- xdg-terminal-exec
bindd = SUPER, T, Telegram, exec, uwsm-app -- Telegram
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER, C, Editor, exec, omarchy-launch-editor
bindd = SUPER, X, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER, I, Settings, exec, systemsettings || gnome-control-center
bindd = CTRL SHIFT, Escape, Task Manager, exec, omarchy-launch-tui btop
bindd = CTRL SUPER, V, Volume Mixer, exec, pavucontrol

# -- Web Apps (Separate Windows) --
bindd = SUPER, D, TickTick, exec, uwsm-app -- chromium --app="https://ticktick.com/webapp/"
bindd = SUPER, A, NotebookLM, exec, uwsm-app -- chromium --app="https://notebooklm.google.com/"
bindd = SUPER, S, Spotify, exec, uwsm-app -- chromium --app="https://open.spotify.com/"

bindd = SUPER SHIFT, W, WhatsApp, exec, uwsm-app -- chromium --app="https://web.whatsapp.com/"
bindd = SUPER SHIFT, C, Calendar, exec, uwsm-app -- chromium --app="https://calendar.google.com"
bindd = SUPER SHIFT, E, Email, exec, uwsm-app -- chromium --app="https://mail.google.com"
bindd = SUPER SHIFT, Y, YouTube, exec, uwsm-app -- chromium --app="https://youtube.com/"
bindd = SUPER SHIFT, P, Photos, exec, uwsm-app -- chromium --app="https://photos.google.com/"
bindd = SUPER SHIFT, X, X (Twitter), exec, uwsm-app -- chromium --app="https://x.com/"

# -- Window Management Customizations --
bindd = SUPER, Q, Close window, killactive,
bindd = SUPER, P, Pin window, pin
bindd = SUPER, W, Toggle Scratchpad, togglespecialworkspace,
bindd = SUPER ALT, W, Move to Scratchpad, movetoworkspacesilent, special

# -- Navigation & Tiling --
bindd = SUPER, BracketLeft, Focus Left, movefocus, l
bindd = SUPER, BracketRight, Focus Right, movefocus, r
binde = SUPER, Semicolon, Split Ratio -, layoutmsg, splitratio -0.1
binde = SUPER, Apostrophe, Split Ratio +, layoutmsg, splitratio +0.1

# -- Utilities & Filters --
bindd = SUPER, V, Clipboard, exec, /home/arch/.local/bin/omarchy-fuzzel-clipboard
bindd = SUPER, G, Toggle Grayscale, exec, hyprctl getoption decoration:screen_shader -j | jq -r '.str' | grep -q "grayscale.glsl" && hyprctl keyword decoration:screen_shader "" || hyprctl keyword decoration:screen_shader /home/arch/.config/hypr/shaders/grayscale.glsl
bindd = SUPER, N, Nightlight, exec, omarchy-toggle-nightlight
bindd = SUPER SHIFT, S, Screenshot, exec, hyprshot -m region --clipboard-only
bindd = SUPER SHIFT, X, OCR (ukr+eng+deu+rus), exec, grim -g "$(slurp)" - | tesseract stdin stdout -l ukr+eng+deu+rus | wl-copy
bindd = SUPER SHIFT, C, Color Picker, exec, hyprpicker -a

# -- Additional Bindings --
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux
bindd = SUPER SHIFT, M, Music (Spotify App), exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor (Alt), exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- bitwarden-desktop
