#bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
#bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- bitwarden-desktop

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
unbind = SUPER, W
unbind = SUPER, J
unbind = SUPER, P
unbind = SUPER, T
unbind = SUPER CTRL, F
unbind = SUPER ALT, F
unbind = SUPER, O
unbind = SUPER, L
unbind = SUPER, S
unbind = SUPER ALT, S
unbind = SUPER, Slash
unbind = SUPER SHIFT, A
unbind = SUPER SHIFT, R
unbind = SUPER, SPACE
unbind = SUPER CTRL, X


# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bind = SUPER, D, exec, uwsm-app -- chromium --app="https://ticktick.com/webapp/"
bind = SUPER, A, exec, uwsm-app -- chromium --app="https://notebooklm.google.com/"
bind = SUPER, S, exec, uwsm-app -- chromium --app="https://open.spotify.com/"

bind = SUPER_SHIFT, C, exec, uwsm-app -- chromium --app="https://calendar.google.com"
bind = SUPER_SHIFT, E, exec, uwsm-app -- chromium --app="https://mail.google.com"
bind = SUPER_SHIFT, Y, exec, uwsm-app -- chromium --app="https://youtube.com/"
bind = SUPER_SHIFT, W, exec, uwsm-app -- chromium --app="https://web.whatsapp.com/"

# -- System & Menus --
bindr = SUPER, Super_L, exec, omarchy-launch-walker
bind  = SUPER, Space, exec, omarchy-menu
bind  = SUPER, R, exec, hyprctl reload
bind  = SUPER, Slash, exec, omarchy-menu-keybindings
bind  = SUPER_ALT, T, exec, omarchy-menu background

# -- Apps (Overrides) --
bindd = CTRL SHIFT, Escape, Task Manager, exec, omarchy-launch-tui btop
bind = SUPER, T, exec, uwsm-app -- Telegram
bind = SUPER, E, exec, uwsm-app -- nautilus --new-window
bind = SUPER, B, exec, omarchy-launch-browser
bind = SUPER, C, exec, omarchy-launch-editor
bind = SUPER, I, exec, systemsettings || gnome-control-center
bind = CTRL_SHIFT, Escape, exec, gnome-system-monitor || btop

# -- Screenshots & OCR --
bind = SUPER_SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = SUPER_SHIFT, X, exec, grim -g "$(slurp)" - | tesseract stdin stdout -l ukr+eng+deu+rus | wl-copy
bind = SUPER_SHIFT, C, exec, hyprpicker -a

# -- Utilities & Filters --
bindd = SUPER, G, Toggle Grayscale, exec, hyprctl getoption decoration:screen_shader -j | jq -r '.str' | grep -q "grayscale.glsl" && hyprctl keyword decoration:screen_shader "" || hyprctl keyword decoration:screen_shader /home/arch/.config/hypr/shaders/grayscale.glsl
bindd = SUPER, N, Nightlight, exec, omarchy-toggle-nightlight

# -- Clipboard Manager --
bind = SUPER_CTRL, V, exec, cliphist list | omarchy-menu-clipboard | cliphist decode | wl-copy
bind = SUPER, V, exec, wl-paste | wtype -

# -- Volume & Brightness --
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-


# ---------------------------------------------
bindd = SUPER, Q, Close window, killactive,
#bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
#bindd = SUPER, P, Pseudo window, pseudo, # dwindle
#bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
#bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
#bindd = SUPER ALT, F, Full width, fullscreen, 1
bindd = SUPER, P, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER, I, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
bindd = SUPER, W, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, W, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
#bindd = SUPER, Slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
# -- Workspaces (Silent Move) --
bind = SUPER_ALT, 1, movetoworkspacesilent, 1
bind = SUPER_ALT, 2, movetoworkspacesilent, 2
bind = SUPER_ALT, 3, movetoworkspacesilent, 3
bind = SUPER_ALT, 4, movetoworkspacesilent, 4
bind = SUPER_ALT, 5, movetoworkspacesilent, 5
bind = SUPER_ALT, 6, movetoworkspacesilent, 6
bind = SUPER_ALT, 7, movetoworkspacesilent, 7
bind = SUPER_ALT, 8, movetoworkspacesilent, 8
bind = SUPER_ALT, 9, movetoworkspacesilent, 9
bind = SUPER_ALT, 0, movetoworkspacesilent, 10

# Cursor settings
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
# Add extra bindings
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
