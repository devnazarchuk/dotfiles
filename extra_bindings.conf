# =============================================================================
# EXTRA BINDINGS (Adapted for Omarchy/Standard Tools)
# =============================================================================

# -- Launcher & Menus --
bind = SUPER, SUPER_L, exec, pkill fuzzel || fuzzel
bind = SUPER, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = SUPER, Period, exec, omarchy-launch-tui "fuzzel-emoji" # Або інший емодзі-пікер

# -- Screenshots & Utilities --
# Region Screenshot (Super+Shift+S)
bind = SUPER_SHIFT, S, exec, hyprshot -m region --clipboard-only
# Color Picker (Super+Shift+C)
bind = SUPER_SHIFT, C, exec, hyprpicker -a

# -- Window Management --
bind = SUPER, Q, killactive,
bind = SUPER, F, fullscreen, 0
bind = SUPER, D, fullscreen, 1
bind = SUPER, P, pin
bind = SUPER, Space, togglefloating,

# Focusing (Super + Arrows)
bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d

# Moving Windows (Super + Shift + Arrows)
bind = SUPER_SHIFT, Left, movewindow, l
bind = SUPER_SHIFT, Right, movewindow, r
bind = SUPER_SHIFT, Up, movewindow, u
bind = SUPER_SHIFT, Down, movewindow, d

# -- Workspaces --
# Switch to workspace with Super + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move to workspace with Super + Alt + [0-9]
bind = SUPER_ALT, 1, movetoworkspacesilent, 1
bind = SUPER_ALT, 2, movetoworkspacesilent, 2
bind = SUPER_ALT, 3, movetoworkspacesilent, 3
bind = SUPER_ALT, 4, movetoworkspacesilent, 4
bind = SUPER_ALT, 5, movetoworkspacesilent, 5
bind = SUPER_ALT, 6, movetoworkspacesilent, 6
bind = SUPER_ALT, 7, movetoworkspacesilent, 7
bind = SUPER_ALT, 8, movetoworkspacesilent, 8
bind = SUPER_ALT, 9, movetoworkspacesilent, 9
bind = SUPER_ALT, 0, movetoworkspacesilent, 10

# Special Workspace (Scratchpad)
bind = SUPER, S, togglespecialworkspace,
bind = SUPER_ALT, S, movetoworkspacesilent, special

# -- Media Keys --
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# -- Apps --
bind = SUPER, Return, exec, uwsm-app -- xdg-terminal-exec
bind = SUPER, E, exec, uwsm-app -- nautilus
bind = SUPER, W, exec, omarchy-launch-browser
